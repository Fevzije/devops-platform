services:
  db:
    image: postgres:15
    container_name: devops_db
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  api:
    build: ./api
    container_name: devops_api
    env_file:
      - .env
    ports:
      - "5000:5000"
    depends_on:
      - db

  worker:
    build: ./worker
    container_name: devops_worker
    env_file:
      - .env
    depends_on:
      - db

volumes:
  pgdata:
